# ══════════════════════════════════════════════════════════════════
#  nginx.conf — PersonalLearningPro Reverse Proxy
#
#  Routes:
#    /              → EduAI main app (React frontend)
#    /api/*         → EduAI backend (Express)
#    /arena/*       → OpenMAIC AI classroom (Next.js)
#    /gateway/*     → IniClaw agent gateway
# ══════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # ── Gzip compression ──────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml font/truetype font/opentype 
             application/vnd.ms-fontobject image/svg+xml;

  # ── Rate limiting ─────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=gateway_limit:10m rate=30r/s;

  # ── Upstream services ─────────────────────────────────────────────
  upstream eduai_backend {
    server eduai-app:5001;
  }

  upstream openmaic_web {
    server openmaic-web:3000;
  }

  upstream iniclaw_gateway {
    server iniclaw-gateway:4000;
  }

  # ── HTTP to HTTPS redirect (production) ───────────────────────────
  server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS (production only)
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Main HTTPS server ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (production)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── EduAI Main App (Root) ─────────────────────────────────────
    location / {
      proxy_pass http://eduai_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering off;
    }

    # ── EduAI API Routes ──────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;

      proxy_pass http://eduai_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # ── Auth Routes (stricter rate limit) ─────────────────────────
    location /api/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;

      proxy_pass http://eduai_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── OpenMAIC AI Classroom ────────────────────────────────────
    location /arena/ {
      proxy_pass http://openmaic_web/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering off;

      # Rewrite cookies to include /arena path
      proxy_cookie_path / /arena/;
    }

    # ── IniClaw Agent Gateway ────────────────────────────────────
    location /gateway/ {
      limit_req zone=gateway_limit burst=100 nodelay;

      proxy_pass http://iniclaw_gateway/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # ── WebSocket support (MessagePal) ───────────────────────────
    location /ws/ {
      proxy_pass http://eduai_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
      proxy_buffering off;
    }

    # ── Health check endpoint ────────────────────────────────────
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}
