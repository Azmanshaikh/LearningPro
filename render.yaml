services:
  - type: web
    name: learningpro-api
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build:api
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SERVE_WEB
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EVALUATION_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_STUDY_PLAN_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_ANALYSIS_MODEL
        value: gemini-2.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: START_MESSAGEPAL_HTTP
        value: "false"
      - key: ASTRA_DB_SECURE_BUNDLE_PATH
        value: ./config/secure-connect-chat-db.zip
      - key: ASTRA_DB_APPLICATION_TOKEN
        sync: false
      - key: ASTRA_DB_KEYSPACE
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: OPENMAIC_INTERNAL_URL
        sync: false
      - key: INICLAW_GATEWAY_URL
        sync: false
      - key: BRIDGE_SECRET
        sync: false
